<html lang="zh-CN">

<head>

    <style>
        :root {
            --bg-base: #0a0a0f;
            --panel-bg: rgba(18, 20, 28, 0.85);
            --panel-border: rgba(102, 252, 241, 0.15);
            --accent-cyan: #66fcf1;
            --text-primary: #f0f0f0;
            --text-secondary: #8b9ac1;
            --success: #00e676;
            --warning: #ffea00;
            --danger: #ff1744;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background: var(--bg-base);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            height: 60px;
            padding: 0 30px;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .report-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .report-title span.tag {
            background: rgba(102, 252, 241, 0.1);
            color: var(--accent-cyan);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            border: 1px solid var(--accent-cyan);
        }

        .data-source {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
            cursor: help;
        }

        /* Top Navigation - Multi-Location Switcher */
        .location-switcher {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-right: 20px;
        }

        .loc-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .loc-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .loc-btn.active {
            background: var(--accent-cyan);
            color: #000;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.4);
        }

        .loc-btn[data-recommend="true"]::after {
            content: "🏆 强推";
            font-size: 10px;
            margin-left: 6px;
            background: #000;
            color: var(--accent-cyan);
            padding: 2px 6px;
            border-radius: 10px;
        }

        .workspace {
            display: flex;
            flex: 1;
            position: relative;
            height: calc(100vh - 60px);
            overflow: hidden;
        }

        .sidebar-panel {
            width: 500px;
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border-right: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
            height: 100%;
        }

        .tabs-header {
            display: flex;
            border-bottom: 1px solid var(--panel-border);
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 15px 0;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: var(--accent-cyan);
            border-bottom-color: var(--accent-cyan);
            background: rgba(102, 252, 241, 0.05);
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            padding-bottom: 60px;
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .tab-content::-webkit-scrollbar {
            width: 4px;
        }

        .tab-content::-webkit-scrollbar-thumb {
            background: rgba(102, 252, 241, 0.2);
            border-radius: 2px;
        }

        .map-wrapper {
            flex: 1;
            position: relative;
        }

        #amap-container {
            width: 100%;
            height: 100%;
            background: #000;
        }

        .final-decision-flyout {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 340px;
            background: rgba(15, 15, 20, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--accent-cyan);
            border-radius: 12px;
            padding: 20px;
            z-index: 20;
            transition: border-color 0.3s;
        }

        .flyout-header {
            font-size: 12px;
            color: var(--text-secondary);
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .score-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        .big-score {
            font-size: 48px;
            font-weight: 800;
            color: var(--text-primary);
            font-family: var(--font-mono);
            line-height: 1;
        }

        .grade-badge {
            background: var(--accent-cyan);
            color: #0a0a0f;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: 800;
            font-size: 18px;
        }

        .grade-badge.danger {
            background: var(--danger);
        }

        .grade-badge.warn {
            background: var(--warning);
        }

        .grade-badge.safe {
            background: var(--success);
        }

        .kill-reason {
            font-size: 13px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
        }

        .kill-reason .highlight {
            color: var(--accent-cyan);
            font-weight: bold;
        }

        .section-cap {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 30px 0 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-cap::before {
            content: '■';
            color: var(--accent-cyan);
            font-size: 10px;
        }

        .intent-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .radar-container {
            width: 100%;
            height: 260px;
            margin: 10px 0;
        }

        /* Metric Cards */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
        }

        .m-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .m-val {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            font-family: var(--font-mono);
        }

        .m-sub {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 5px;
            opacity: 0.8;
        }

        /* Progress Bars */
        .progress-row {
            margin-bottom: 12px;
        }

        .p-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        .p-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .p-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s;
        }

        .p-fill.bg-danger {
            background: var(--danger);
            box-shadow: 0 0 10px var(--danger);
        }

        .p-fill.bg-warn {
            background: var(--warning);
            box-shadow: 0 0 10px var(--warning);
        }

        .p-fill.bg-safe {
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        /* Insight Blocks */
        .insight-block {
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.2);
            border-left: 3px solid var(--accent-cyan);
            border-radius: 0 8px 8px 0;
            margin-bottom: 12px;
            font-size: 13px;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.85);
        }

        .ib-title {
            font-weight: 700;
            margin-bottom: 5px;
            color: var(--text-primary);
        }

        .custom-info-window {
            background: rgba(15, 15, 20, 0.95);
            border: 1px solid var(--accent-cyan);
            padding: 15px;
            border-radius: 8px;
            color: white;
            min-width: 200px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        .custom-info-window h4 {
            margin: 0 0 10px 0;
            color: var(--accent-cyan);
            font-size: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
        }

        .custom-info-window p {
            margin: 5px 0;
            font-size: 12px;
            color: #ccc;
        }

        .amap-info-close {
            color: white;
            top: 10px;
            right: 10px;
            position: absolute;
            cursor: pointer;
            text-decoration: none;
        }

        /* 地图风格切换器 */
        .map-style-toggle {
            position: absolute; top: 20px; left: 20px;
            background: rgba(15, 15, 20, 0.9); backdrop-filter: blur(10px);
            border: 1px solid var(--accent-cyan); border-radius: 8px; padding: 5px;
            display: flex; gap: 5px; z-index: 50; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .toggle-btn {
            background: transparent; border: none; color: var(--text-secondary);
            padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .toggle-btn.active { background: rgba(102, 252, 241, 0.15); color: var(--accent-cyan); }
    </style>
</head>

                    { loc: [119.960, 30.385], name: '良渚博物院', type: 'office', desc: '家庭微度假首选，亲子客群与研学流量带来周末大爆。' },
                    { loc: [119.963, 30.383], name: '良渚站', type: 'metro', desc: '微度假游客集散核心入口。' },

                ],
                heatData: [
                    {lng: 119.965, lat: 30.381, count: 95}, {lng: 119.966, lat: 30.380, count: 80},
                    {lng: 119.968, lat: 30.378, count: 70}, {lng: 119.960, lat: 30.385, count: 85},
                    {lng: 119.963, lat: 30.383, count: 50}, {lng: 119.964, lat: 30.382, count: 40},
                    {lng: 119.967, lat: 30.379, count: 65}, {lng: 119.961, lat: 30.384, count: 45}
                ]
            }
        };

        let currentLoc = 'C';
        let map, radarPlot, markers = [];
        let globalHeatmapLayer = null;

        // ----------------------------------------
        // 核心可视化渲染引擎 (Render Engines)
        // ----------------------------------------
        function setMapStyle(style, btn) {
            if(map) map.setMapStyle(style);
            if(btn) {
                btn.parentElement.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
        }

        function showInfoWin(mapInstance, data, position) {
            const infoWindow = new AMap.InfoWindow({
                isCustom: true,
                content: `<div class="custom-info-window"><a href="javascript:void(0)" class="amap-info-close" onclick="map.clearInfoWindow()">✖</a><h4>${data.title}</h4><p>${data.desc}</p></div>`,
                offset: new AMap.Pixel(0, -20)
            });
            infoWindow.open(mapInstance, position);
        }

        function renderConcentricCircles(mapInstance, center, circlesData) {
            circlesData.forEach(circle => {
                const zone = new AMap.Circle({
                    center: center, radius: circle.radius,
                    strokeColor: circle.color, strokeOpacity: 0.8, strokeWeight: 2,
                    fillColor: circle.color, fillOpacity: circle.fillOpacity, zIndex: 50,
                    cursor: 'pointer', extData: { title: circle.title, desc: circle.desc }
                });
                mapInstance.add(zone);
                zone.on('click', function (e) { showInfoWin(mapInstance, e.target.getExtData(), e.lnglat); });
            });
        }

        function renderPOIs(mapInstance, poiDataList) {
            poiDataList.forEach(pt => {
                let badgeHtml = '';
                if(pt.type === 'office') badgeHtml = `<div style="padding: 2px 6px; background: rgba(0,230,118,0.2); border: 1px solid var(--success); color: var(--success); font-family: 'JetBrains Mono'; font-size: 10px; font-weight: bold; border-radius: 4px; backdrop-filter: blur(4px); cursor: pointer;">OFFICE</div>`;
                else if(pt.type === 'metro') badgeHtml = `<div style="padding: 2px 6px; background: rgba(102,252,241,0.2); border: 1px solid var(--accent-cyan); color: var(--accent-cyan); font-family: 'JetBrains Mono'; font-size: 10px; font-weight: bold; border-radius: 4px; backdrop-filter: blur(4px); cursor: pointer;">METRO</div>`;
                else badgeHtml = `<div style="width: 12px; height: 12px; background: var(--danger); border: 2px solid white; border-radius: 50%; box-shadow: 0 0 10px var(--danger); cursor: pointer;"></div>`;

                const marker = new AMap.Marker({
                    position: pt.loc, content: badgeHtml, anchor: 'center', zIndex: 80,
                    extData: { title: pt.name, desc: pt.desc }
                });
                marker.setMap(mapInstance);
                marker.on('click', function (e) { showInfoWin(mapInstance, e.target.getExtData(), marker.getPosition()); });
            });
        }

        function renderHeatMap(mapInstance, heatDataPoints) {
            if(!heatDataPoints || heatDataPoints.length === 0) return;
            mapInstance.plugin(["AMap.HeatMap"], function () {
                if(globalHeatmapLayer) { globalHeatmapLayer.setMap(null); }
                globalHeatmapLayer = new AMap.HeatMap(mapInstance, {
                    radius: 25, opacity: [0, 0.8],
                    gradient: { 0.5: 'blue', 0.65: 'rgb(117,211,248)', 0.7: 'rgb(0, 255, 0)', 0.9: '#ffea00', 1.0: 'red' }
                });
                globalHeatmapLayer.setDataSet({ data: heatDataPoints, max: 100 });
            });
        }

        // ----------------------------------------
        // Init Map & Chart
        // ----------------------------------------
        function initMap() {
            map = new AMap.Map('amap-container', {
                zoom: 15, center: locationData['C'].latlng, mapStyle: 'amap://styles/darkblue', viewMode: '3D', pitch: 45
            });

            radarPlot = new G2Plot.Radar('radar-chart', {
                data: locationData['C'].radar, xField: 'item', yField: 'score', meta: { score: { min: 0, max: 100 } },
                autoFit: true, theme: 'dark',
                area: { style: { fill: locationData['C'].color, fillOpacity: 0.15 } },
                line: { style: { stroke: locationData['C'].color, lineWidth: 2 } },
                point: { size: 3, shape: 'circle' },
                xAxis: { line: null, tickLine: null, label: { style: { fill: '#8b9ac1', fontSize: 11 } } },
                yAxis: { grid: { line: { type: 'circle', style: { stroke: 'rgba(255,255,255,0.08)' } } } },
                tooltip: { shared: true }
            });
            radarPlot.render();

            buildSwitcher();
            switchLocation('C'); // Default to C
        }

        // ----------------------------------------
        // UI Render Logic
        // ----------------------------------------
        function buildSwitcher() {
            const container = document.getElementById('loc-switcher');
            ['A', 'B', 'C'].forEach(key => {
                const btn = document.createElement('button');
                btn.className = 'loc-btn';
                btn.id = `btn-loc-${key}`;
                btn.innerHTML = `${locationData[key].name}`;
                if (locationData[key].recommend) btn.setAttribute('data-recommend', "true");
                btn.onclick = () => switchLocation(key);
                container.appendChild(btn);
            });
        }

        function switchLocation(key) {
            currentLoc = key;
            const data = locationData[key];

            // Update Buttons
            document.querySelectorAll('.loc-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-loc-${key}`).classList.add('active');

            // Fly Map
            map.setCenter(data.latlng);

            // Clear & Draw Markers
            map.clearMap();
            if(globalHeatmapLayer) { globalHeatmapLayer.setMap(null); globalHeatmapLayer = null; }
            
            // 绘制中心靶心点
            const targetMarker = new AMap.Marker({
                position: data.latlng,
                content: `<div style="width: 30px; height: 30px; border: 3px solid ${data.color}; border-radius: 50%; box-shadow: 0 0 25px ${data.color}; background: rgba(0, 0, 0, 0.5); display: flex; align-items: center; justify-content: center;"><div style="width: 8px; height: 8px; background: white; border-radius: 50%;"></div></div>`,
                anchor: 'center',
                zIndex: 100,
                extData: { title: `拟选店址: ${data.name}`, desc: `综合推荐指数: ${data.score} (${data.grade})` }
            });
            map.add(targetMarker);
            targetMarker.on('click', function(e) { showInfoWin(map, e.target.getExtData(), e.target.getPosition()); });

            // 智能渲染当前商圈的地理扩展层 (如果有预置数据)
            if(data.circles) renderConcentricCircles(map, data.latlng, data.circles);
            if(data.pois) renderPOIs(map, data.pois);
            if(data.heatData) renderHeatMap(map, data.heatData);

            // Update Flyout styling
            const flyout = document.getElementById('ui-flyout');
            flyout.style.borderColor = data.color;
            document.getElementById('ui-score').innerText = data.score;
            document.getElementById('ui-grade').className = `grade-badge ${data.gradeClass}`;
            document.getElementById('ui-grade').innerText = data.grade;
            document.getElementById('ui-reason').innerHTML = data.reason;

            // Re-render Radar
            radarPlot.changeData(data.radar);
            radarPlot.update({
                area: { style: { fill: data.color, fillOpacity: 0.15 } },
                line: { style: { stroke: data.color, lineWidth: 2 } }
            });

            // Update Texts
            document.getElementById('ui-intent').innerHTML = data.intent;
            document.getElementById('ui-metric1-val').innerHTML = data.metric1;
            document.getElementById('ui-metric1-sub').innerHTML = data.m1sub;
            document.getElementById('ui-metric2-val').innerHTML = data.metric2;
            document.getElementById('ui-metric2-sub').innerHTML = data.m2sub;
            document.getElementById('ui-insight1').innerHTML = data.insight1;

            document.getElementById('ui-insight2').innerHTML = data.insight2;
            let progressHtml = '';
            data.progress.forEach(p => {
                progressHtml += `
                <div class="progress-row">
                    <div class="p-header"><span>${p.label}</span> <span>${p.pct}%</span></div>
                    <div class="p-track"><div class="p-fill ${p.color}" style="width: ${p.pct}%;"></div></div>
                </div>`;
            });
            document.getElementById('ui-progress-bars').innerHTML = progressHtml;

            document.getElementById('ui-finance1').innerHTML = data.finance1;
            document.getElementById('ui-finance2').innerHTML = data.finance2;
            document.getElementById('ui-insight3').innerHTML = data.insight3;
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        // Init after JS loads
        window.onload = () => {
            // To prevent map errors if AMap hasn't fully loaded, added a slight delay
            setTimeout(initMap, 300);
        };
    </script>
